[project]
name = "gpt-auto-manager"
version = "0.1.0"
description = "Chinese-enhanced web control panel for OpenAI registration and operations workflows."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "PyYAML",
    "pydantic",
    "websockets",
    "requests",
    "httpx[socks]",
    "curl_cffi",
    "PySocks",
    "cloudflare",
    "google-api-python-client",
    "google-auth-httplib2",
    "google-auth-oauthlib",
]

[tool.uv]
package = false
